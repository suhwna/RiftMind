server:
  port: 8081

spring:
  application:
    name: summoner-service
  datasource:
    url: jdbc:h2:mem:riftmind;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true
  cache:
    type: caffeine
    cache-names:
      - riotAccountByRiotId
      - riotSummonerByPuuid
      - riotMatchIdsByPuuid
      - riotMatchById
  h2:
    console:
      enabled: true
      path: /h2-console

riftmind:
  riot:
    account-base-url: https://asia.api.riotgames.com
    summoner-base-url: https://kr.api.riotgames.com
    match-base-url: https://asia.api.riotgames.com
    api-key: ${RIOT_API_KEY:}
    match-fetch-max-count: 20
