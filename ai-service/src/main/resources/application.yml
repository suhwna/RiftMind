server:
  port: ${SERVER_PORT:18083}

spring:
  application:
    name: ai-service

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

riftmind:
  match-service:
    base-url: ${MATCH_SERVICE_URL:http://localhost:18081}
  openai:
    base-url: https://api.openai.com/v1
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-5.2}
