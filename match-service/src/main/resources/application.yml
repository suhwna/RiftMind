server:
  port: 18081

spring:
  application:
    name: match-service
  datasource:
    url: ${MATCH_DB_URL:jdbc:postgresql://localhost:15432/riftmind_match}
    username: ${MATCH_DB_USERNAME:riftmind}
    password: ${MATCH_DB_PASSWORD:riftmind}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true
  cache:
    type: caffeine
    cache-names:
      - riotAccountByRiotId
      - riotSummonerByPuuid
      - riotMatchIdsByPuuid
      - riotMatchById

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

riftmind:
  riot:
    account-base-url: https://asia.api.riotgames.com
    summoner-base-url: https://kr.api.riotgames.com
    match-base-url: https://asia.api.riotgames.com
    data-dragon-base-url: https://ddragon.leagueoflegends.com
    data-dragon-realm: kr
    data-dragon-locale: ko_KR
    api-key: ${RIOT_API_KEY:}
    match-fetch-max-count: 100
